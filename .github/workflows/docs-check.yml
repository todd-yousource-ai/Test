name: Docs OK

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
          - '**/*.md'
          - '**/*.rst'
          - '**/*.txt'
          - '**/*.gitkeep'
          - '**/*.json'
          - '**/*.yaml'
          - '**/*.yml'
          - '**/*.toml'
          - '**/*.cfg'
          - '**/*.ini'
          - '**/*.env'
          - 'LICENSE'
          - 'LICENSE.md'
          - '.gitignore'
          - '.editorconfig'
          - '.gitmodules'
          - 'VERSION'
          - 'CODEOWNERS'
          - 'CONTRIBUTING.md'

jobs:
  docs-ok:
    runs-on: ubuntu-latest
    steps:
      - name: Docs-only PR — no tests required
        run: echo "Documentation-only PR. CI tests not required."
